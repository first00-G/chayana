<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SavingsTrack — 100K Goal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --surface2: #1a2236;
      --border: rgba(255,255,255,0.07);
      --accent: #22d3a5;
      --accent2: #f97316;
      --warn: #f43f5e;
      --text: #e2e8f0;
      --muted: #64748b;
      --goal: 100000;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    /* noise texture overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    .wrap { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 48px 24px 40px;
      position: relative;
    }
    header .tag {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 18px;
      text-transform: uppercase;
    }
    header h1 {
      font-size: clamp(2rem, 6vw, 3.6rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    header p {
      color: var(--muted);
      font-size: 14px;
      font-weight: 300;
    }

    /* ── GOAL RING ── */
    .ring-section {
      display: flex;
      justify-content: center;
      margin: 0 0 36px;
    }
    .ring-wrap {
      position: relative;
      width: 200px; height: 200px;
    }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 14; }
    .ring-fill {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 14;
      stroke-linecap: round;
      stroke-dasharray: 502;
      stroke-dashoffset: 502;
      transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1);
    }
    .ring-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
    }
    .ring-label .pct {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      font-family: 'DM Mono', monospace;
    }
    .ring-label .pct-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    /* ── STAT CARDS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: transform .2s, border-color .2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.14); }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      border-radius: 2px 2px 0 0;
    }
    .stat-card.green::before { background: var(--accent); }
    .stat-card.red::before { background: var(--warn); }
    .stat-card.orange::before { background: var(--accent2); }
    .stat-card.blue::before { background: #60a5fa; }
    .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
    .stat-val { font-family: 'DM Mono', monospace; font-size: 1.5rem; font-weight: 500; }
    .stat-card.green .stat-val { color: var(--accent); }
    .stat-card.red .stat-val { color: var(--warn); }
    .stat-card.orange .stat-val { color: var(--accent2); }
    .stat-card.blue .stat-val { color: #60a5fa; }

    /* ── DATE CONTROLS ── */
    .date-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .date-bar label { font-size: 13px; color: var(--muted); white-space: nowrap; }
    .date-bar input[type="date"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 7px 12px;
      outline: none;
      transition: border-color .2s;
    }
    .date-bar input[type="date"]:focus { border-color: var(--accent); }
    .date-info { font-size: 12px; color: var(--muted); margin-left: auto; }
    .date-info span { color: var(--accent); font-weight: 600; }

    /* ── MEMBER TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
    }
    .table-header h2 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .table-header .badge {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      background: rgba(34,211,165,0.12);
      color: var(--accent);
      border: 1px solid rgba(34,211,165,0.25);
      border-radius: 100px;
      padding: 3px 12px;
    }

    .btn-reset {
      background: rgba(244,63,94,0.1);
      color: var(--warn);
      border: 1px solid rgba(244,63,94,0.25);
      font-family: 'Sora', sans-serif;
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-reset:hover { background: rgba(244,63,94,0.2); }

    .member-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    }

    .member-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      transition: background .15s;
      cursor: pointer;
      user-select: none;
    }
    .member-row:hover { background: rgba(255,255,255,0.03); }
    .member-row.paid { background: rgba(34,211,165,0.05); }
    .member-row.paid:hover { background: rgba(34,211,165,0.09); }

    .member-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      width: 22px;
      flex-shrink: 0;
    }

    /* custom checkbox */
    .cb-wrap {
      position: relative;
      width: 22px; height: 22px;
      flex-shrink: 0;
    }
    .cb-wrap input { opacity: 0; position: absolute; width: 0; height: 0; }
    .cb-box {
      width: 22px; height: 22px;
      border-radius: 6px;
      border: 2px solid var(--muted);
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      position: relative;
    }
    .cb-wrap input:checked ~ .cb-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .cb-box svg { display: none; }
    .cb-wrap input:checked ~ .cb-box svg { display: block; }

    .member-name { font-size: 14px; flex: 1; }
    .member-row.paid .member-name { color: var(--text); }
    .member-row:not(.paid) .member-name { color: var(--muted); }

    .member-status {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .member-row.paid .member-status {
      background: rgba(34,211,165,0.15);
      color: var(--accent);
    }
    .member-row:not(.paid) .member-status {
      background: rgba(100,116,139,0.15);
      color: var(--muted);
    }

    .member-amount {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .member-row.paid .member-amount { color: var(--accent); }

    /* ── FOOTER ── */
    footer {
      margin-top: 36px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .stat-card, .ring-section, .date-bar, .table-wrap {
      animation: fadeUp .5s ease both;
    }
    .stat-card:nth-child(1) { animation-delay: .05s; }
    .stat-card:nth-child(2) { animation-delay: .10s; }
    .stat-card:nth-child(3) { animation-delay: .15s; }
    .stat-card:nth-child(4) { animation-delay: .20s; }
    .date-bar { animation-delay: .25s; }
    .table-wrap { animation-delay: .30s; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header>
    <div class="tag">Group Savings Tracker</div>
    <h1> เก็บเงินห้อง จ้า </h1>
    <p>23 คน · 10 บาท/คน/วัน · เริ่มออมวันนี้!</p>
  </header>

  <!-- RING -->
  <div class="ring-section">
    <div class="ring-wrap">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#22d3a5"/>
            <stop offset="100%" stop-color="#60a5fa"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="100" cy="100" r="80"/>
        <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="80"/>
      </svg>
      <div class="ring-label">
        <div class="pct" id="pctText">0%</div>
        <div class="pct-sub">OF GOAL</div>
      </div>
    </div>
  </div>

  <!-- STAT CARDS -->
  <div class="stats">
    <div class="stat-card green">
      <div class="stat-label">เงินรวมปัจจุบัน</div>
      <div class="stat-val" id="totalSaved">0 ฿</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">ยังขาดอีก</div>
      <div class="stat-val" id="totalMissing">50,000 ฿</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-label">จ่ายแล้ววันนี้</div>
      <div class="stat-val" id="paidToday">0 / 23</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">เฉลี่ยที่ขาดต่อคน</div>
      <div class="stat-val" id="avgMissing">0 ฿</div>
    </div>
  </div>

  <!-- DATE BAR -->
  <div class="date-bar">
    <label>📅 วันที่บันทึก:</label>
    <input type="date" id="datePicker" />
    <span class="date-info">วันนี้จ่ายแล้ว <span id="todayCount">0</span> / 23 คน</span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-header">
      <h2>รายชื่อสมาชิก — 23 คน</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <span class="badge" id="paidBadge">0 จ่ายแล้ว</span>
        <button class="btn-reset" onclick="confirmReset()">ล้างวันนี้</button>
      </div>
    </div>
    <div class="member-grid" id="memberGrid"></div>
  </div>

  <footer>
    <p>ข้อมูลบันทึกใน Browser อัตโนมัติ · 10 ฿/คน/วัน · เป้า 50,000 ฿</p>
  </footer>
</div>

<script>
  const GOAL = 100000;
  const MEMBERS = 23;
  const DAILY_RATE = 10;
  const STORAGE_KEY = 'savings_v2';

  // data: { [dateStr]: Set<number> }  — stored as arrays
  let data = {};
  let currentDate = todayStr();

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        for (const k in parsed) data[k] = new Set(parsed[k]);
      }
    } catch(e) { data = {}; }
  }

  function save() {
    const out = {};
    for (const k in data) out[k] = [...data[k]];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(out));
  }

  function getSet(date) {
    if (!data[date]) data[date] = new Set();
    return data[date];
  }

  // Total paid across ALL dates
  function totalPaid() {
    let total = 0;
    for (const k in data) total += data[k].size;
    return total;
  }

  function render() {
    const set = getSet(currentDate);
    const paidCount = set.size;
    const allPaid = totalPaid();
    const totalMoney = allPaid * DAILY_RATE;
    const missing = Math.max(0, GOAL - totalMoney);
    const pct = Math.min(100, (totalMoney / GOAL) * 100);
    const circ = 2 * Math.PI * 80; // ~502.65

    // Ring
    document.getElementById('ringFill').style.strokeDashoffset = circ - (circ * pct / 100);
    document.getElementById('pctText').textContent = pct.toFixed(1) + '%';

    // Stats
    document.getElementById('totalSaved').textContent = totalMoney.toLocaleString() + ' ฿';
    document.getElementById('totalMissing').textContent = missing.toLocaleString() + ' ฿';
    document.getElementById('paidToday').textContent = paidCount + ' / ' + MEMBERS;
    document.getElementById('avgMissing').textContent = Math.ceil(missing / MEMBERS).toLocaleString() + ' ฿';
    document.getElementById('paidBadge').textContent = paidCount + ' จ่ายแล้ว';
    document.getElementById('todayCount').textContent = paidCount;

    // Grid
    const grid = document.getElementById('memberGrid');
    grid.innerHTML = '';
    for (let i = 1; i <= MEMBERS; i++) {
      const paid = set.has(i);
      const row = document.createElement('div');
      row.className = 'member-row' + (paid ? ' paid' : '');
      row.onclick = () => toggle(i);
      row.innerHTML = `
        <span class="member-num">${String(i).padStart(2,'0')}</span>
        <label class="cb-wrap" onclick="event.stopPropagation();toggle(${i})">
          <input type="checkbox" ${paid ? 'checked' : ''} />
          <div class="cb-box">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1.5 5L4.5 8L11 1.5" stroke="#0b0f1a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </label>
        <span class="member-name">สมาชิกที่ ${i}</span>
        <span class="member-amount">${paid ? '+'+DAILY_RATE+' ฿' : '—'}</span>
        <span class="member-status">${paid ? 'จ่ายแล้ว' : 'ค้างจ่าย'}</span>
      `;
      grid.appendChild(row);
    }
  }

  function toggle(i) {
    const set = getSet(currentDate);
    if (set.has(i)) set.delete(i);
    else set.add(i);
    save();
    render();
  }

  function confirmReset() {
    if (confirm('ล้างข้อมูลวันที่ ' + currentDate + ' ใช่หรือไม่?')) {
      data[currentDate] = new Set();
      save();
      render();
    }
  }

  // Date picker
  const picker = document.getElementById('datePicker');
  picker.value = currentDate;
  picker.addEventListener('change', () => {
    currentDate = picker.value || todayStr();
    render();
  });

  load();
  render();
</script>
</body>
</html>
